apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
    spec:
      containers:
      - name: aceest
        image: harisastha6/aceest-app:v1
        ports:
        - containerPort: 5000