<!DOCTYPE html>
<html>
    <head>
        <title>ACEest Fitness</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <header>
            <div class="header-content">
                ACEest FUNCTIONAL FITNESS SYSTEM
                <button type="button" class="back-btn" onclick="goBack()">Back</button>
            </div>
        </header>
        <div class="container">
            <div class="left-panel">
                <form id="clientForm" onsubmit="return false;">
                    <label>
                        Name
                        <span class="required">*</span>
                    </label>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        required
                        placeholder="Full name"
                    >
                    <label>
                        Age
                        <span class="required">*</span>
                    </label>
                    <input
                        type="number"
                        name="age"
                        id="age"
                        min="14"
                        max="80"
                        required
                        placeholder="14–80"
                    >
                    <label>
                        Weight (kg)
                        <span class="required">*</span>
                    </label>
                    <input
                        type="number"
                        id="weight"
                        name="weight"
                        min="30"
                        max="300"
                        step="0.1"
                        required
                        placeholder="e.g. 68.5"
                    >
                    <label>
                        Height (cm)
                        <span class="required">*</span>
                    </label>
                    <input
                        type="number"
                        id="height"
                        name="height"
                        min="100"
                        max="250"
                        required
                        placeholder="e.g. 172"
                    >
                    <label>
                        Program
                        <span class="required">*</span>
                    </label>
                    <select
                        name="program"
                        id="program"
                        required
                        onchange="updateProgram()"
                    >
                        <option value="">— Select Program —</option>
                        {% for p in programs %}
                        <option value="{{p}}">{{p}}</option>
                        {% endfor %}
                    </select>
                    <label>Weekly Adherence (%)</label>
                    <input
                        type="range"
                        name="progress"
                        min="0"
                        max="100"
                        value="0"
                    >
                    <div id="progressValue" class="progress-value">0%</div>
                    <button type="button" onclick="saveClient()">Save Client</button>
                </form>
            </div>
            <div class="right-panel">
                <div class="block">
                    <h3>Workout Plan</h3>
                    <textarea id="workout" rows="10" readonly></textarea>
                </div>
                <div class="block">
                    <h3>Diet Plan</h3>
                    <textarea id="diet" rows="10" readonly></textarea>
                </div>
                <div class="calories" id="calories">
                    Estimated Calories: —
                </div>
            </div>
        </div>
        <!-- Only minimal inline style needed for form validation feedback -->
        <style>
        .required {
            color: #e74c3c;
            font-size: 0.9em;
        }
        input:invalid:not(:placeholder-shown),
        select:invalid:not(:placeholder-shown) {
            border: 2px solid #e74c3c !important;
        }
        .progress-value {
            font-size: 0.9em;
            text-align: center;
            margin-top: 6px;
            color: #aaa;
        }
        </style>
        <script>
        // Back button
        function goBack() {
            if (history.length > 1) {
                history.back();
            } else {
                // fallback - change this to your actual dashboard/home route
                window.location.href = "/";
            }
        }

        // Update progress display in real-time
        const progressSlider = document.querySelector('input[type="range"]');
        const progressDisplay = document.getElementById('progressValue');

        progressSlider.addEventListener('input', () => {
            progressDisplay.textContent = progressSlider.value + '%';
        });

        async function updateProgram() {
            const program = document.getElementById("program").value;
            const weight = document.getElementById("weight").value;
            const height = document.getElementById("height").value;

            if (!program || !weight || !height) return;

            try {
                const res = await fetch("/program", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        program,
                        weight: parseFloat(weight),
                        height: parseFloat(height)
                    })
                });

                if (!res.ok) throw new Error();

                const data = await res.json();

                document.getElementById("workout").value = data.workout || "";
                document.getElementById("diet").value   = data.diet   || "";
                document.getElementById("calories").textContent =
                    data.calories
                        ? `Estimated Calories: ${data.calories} kcal`
                        : "Estimated Calories: —";
            } catch (err) {
                console.error(err);
                // optional: alert("Couldn't load program data");
            }
        }

        async function saveClient() {
            const form = document.getElementById("clientForm");

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const age    = parseInt(document.getElementById("age").value);
            const weight = parseFloat(document.getElementById("weight").value);
            const height = parseFloat(document.getElementById("height").value);
            const program = document.getElementById("program").value;

            if (age < 14 || age > 80)    { alert("Age must be 14–80 years"); return; }
            if (weight < 30 || weight > 300) { alert("Weight must be 30–300 kg"); return; }
            if (height < 100 || height > 250) { alert("Height must be 100–250 cm"); return; }
            if (!program)                 { alert("Please select a program"); return; }

            try {
                const formData = new FormData(form);
                const res = await fetch("/save_client", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                alert(data.message || "Client saved successfully!");
            } catch (err) {
                alert("Error saving client. Please try again.");
            }
        }
        </script>
    </body>
</html>
